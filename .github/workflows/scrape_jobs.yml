name: Auto Scrape Job Vacancies

on:
  schedule:
    # Run every 4 hours (6x/day = ~720 min/month, aman untuk private repo)
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: |
          python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Scraper"
          git config --global user.email "actions@github.com"
          git add matched_jobs.json matched_jobs.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update scraped job vacancies [skip ci]" && git push)
